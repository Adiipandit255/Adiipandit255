<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="220">
  <defs>
    <linearGradient id="flame1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0b0f19" stop-opacity="0" />
      <stop offset="50%" stop-color="#0072ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="flame2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0b0f19" stop-opacity="0" />
      <stop offset="40%" stop-color="#0052d4" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="flame3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0b0f19" stop-opacity="0" />
      <stop offset="30%" stop-color="#4364f7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.8" />
    </linearGradient>
    <filter id="flame-blur">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    <style>
      .bg {
        fill: #0b0f19;
      }
      .title {
        fill: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 26px;
        font-weight: 700;
        text-anchor: middle;
      }
      .flame-wave {
        transform-origin: bottom center;
      }
      .wave-1 {
        animation: flicker1 3s ease-in-out infinite alternate;
      }
      .wave-2 {
        animation: flicker2 2.2s ease-in-out infinite alternate;
      }
      .wave-3 {
        animation: flicker3 1.8s ease-in-out infinite alternate;
      }
      @keyframes flicker1 {
        0% { transform: scaleY(1) skewX(-2deg); }
        100% { transform: scaleY(1.15) skewX(2deg); }
      }
      @keyframes flicker2 {
        0% { transform: scaleY(1.2) skewX(3deg); }
        100% { transform: scaleY(0.9) skewX(-3deg); }
      }
      @keyframes flicker3 {
        0% { transform: scaleY(0.85) skewX(-1deg); }
        100% { transform: scaleY(1.1) skewX(1deg); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" rx="6" />

  <!-- Animated Flame Waves -->
  <g transform="translate(0, 100)">
    <path d="M 0 120 Q 100 20 200 120 T 400 120 T 600 120 T 800 120 L 800 120 L 0 120 Z" fill="url(#flame1)" class="flame-wave wave-1" />
    <path d="M 0 120 Q 150 40 300 120 T 600 120 T 800 120 L 800 120 L 0 120 Z" fill="url(#flame2)" class="flame-wave wave-2" filter="url(#flame-blur)" />
    <path d="M 0 120 Q 80 50 160 120 T 320 120 T 480 120 T 640 120 T 800 120 L 800 120 L 0 120 Z" fill="url(#flame3)" class="flame-wave wave-3" />
  </g>

  <!-- Content Overlay -->
  <!-- Greeting -->
  <text x="400" y="55" class="title">👋 Hey there! I'm Aditya Sharma</text>

  <!-- Typing SVG -->
  <image href="https://readme-typing-svg.demolab.com?font=Outfit&amp;weight=600&amp;size=24&amp;duration=3000&amp;pause=1000&amp;color=38BDF8&amp;center=true&amp;vCenter=true&amp;width=800&amp;lines=AI+%26+Machine+Learning+Enthusiast+%F0%9F%A4%96;Data+Science+Explorer+%F0%9F%93%8A;Python+%26+Full+Stack+Developer+%F0%9F%90%8D;Building+Real-World+AI+Solutions+%F0%9F%9A%80" x="0" y="75" width="800" height="35" />

  <!-- Badges Row -->
  <g transform="translate(0, 130)">
    <!-- Profile Views -->
    <image href="https://komarev.com/ghpvc/?username=Adiipandit255&amp;label=Profile+Views&amp;style=for-the-badge&amp;color=0284c7" x="200" y="0" width="125" height="28" />
    <!-- Followers -->
    <image href="https://img.shields.io/github/followers/Adiipandit255?style=for-the-badge&amp;logo=github&amp;color=0f172a" x="335" y="0" width="130" height="28" />
    <!-- Stars -->
    <image href="https://img.shields.io/github/stars/Adiipandit255?style=for-the-badge&amp;color=0f172a" x="475" y="0" width="115" height="28" />
  </g>

  <!-- Accent bottom border -->
  <rect x="0" y="218" width="800" height="2" fill="#00f2fe" />
</svg>
